<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Edit book</title>
    <style type="text/css">
        body {
            padding: 50px;
            background-color: beige;
        }

        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: coral;
            color: white;
            text-decoration: none;
            margin: 30px 30px 30px 0px;
            border: 0px;
        }

    </style>
</head>
<body>
<a th:href="@{/}" class="button">
    На главную страницу
</a>


<div class="book-card">
    <h2 th:text="${book.title}"></h2>
    <p><strong>Author:</strong> <span th:text="${book.author.fullName()}"></span></p>
    <p><strong>Genres:</strong> <span th:each="genre : ${book.genreAsString}"><span th:text="${genre}"></span></span></p>
    <p><strong>Comments:</strong></p>
    <ul>
        <li th:each="comment : ${comments}">
            <span th:text="${comment.text()}"></span>
        </li>
    </ul>
</div>


</tbody>
</table>

</body>
</html>
