<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>List of all authors</title>
    <style type="text/css">
        body {
            padding: 50px;
            background-color: beige;
        }

        .authors {
            border: 1px solid coral;
            width: 300px;
            border-collapse: collapse;
        }

        .authors tr td, th {
            padding: 5px;
            border: 2px solid coral;
        }

        .authors td:last-child, td:first-child {
            width: 50px;
        }

        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: coral;
            color: white;
            text-decoration: none;
            margin: 30px 30px 30px 0px;;
        }
    </style>
</head>
<body>
<a th:href="@{/}" class="button">
    На главную страницу
</a>
<h3>Authors:</h3>
<table class="authors">
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="author : ${authors}" th:object="${author}">
        <td th:text="*{id}"></td>
        <td th:text="*{fullName}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
