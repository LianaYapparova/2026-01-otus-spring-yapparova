<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>List of all books</title>
    <style type="text/css">
        body {
            padding: 50px;
            background-color: beige;
        }

        .books {
            border: 1px solid coral;
            width: 300px;
            border-collapse: collapse;
        }

        .books tr td, th {
            padding: 5px;
            border: 2px solid coral;
        }

        .books td:last-child, td:first-child {
            width: 50px;
        }

        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: coral;
            color: white;
            text-decoration: none;
            margin: 30px 30px 30px 0px;;
        }
    </style>
</head>
<body>
<a th:href="@{/}" class="button">
    На главную страницу
</a>
<a th:href="@{/authors}" class="button">
    Авторы
</a>
<a th:href="@{/genres}" class="button">
    Жанры
</a>
<a th:href="@{/create}" class="button">
    Создать книгу
</a>
<h3>Books:</h3>
<table class="books">
    <thead>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Author</th>
        <th>Genre</th>
        <th>Edit book</th>
        <th>Delete book</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="book : ${books}" th:object="${book}">
        <td th:text="*{id}"></td>
        <td> <a th:href="@{/book(id=*{id})}" th:text="*{title}"></a></td>
        <td th:text="*{author.fullName()}"></td>
        <td th:each="genre : ${book.genreAsString}">
            <span th:text="${genre}"></span>
        <td>
            <a href="editbook.html" th:href="@{/edit(id=*{id})}">Edit</a>
        </td>
        <td>
            <form th:action="@{/delete(id=*{id})}" method="post">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tr>
    </tbody>
</table>
</body>
</html>
